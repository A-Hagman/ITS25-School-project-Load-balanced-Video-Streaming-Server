---
- name: Installera nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Skapa videokatalog
  file:
    path: /var/www/videos
    state: directory
    owner: www-data
    mode: "0755"

- name: Konfigurera nginx filserver
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/streaming
  notify: reload nginx

- name: Aktivera site
  file:
    src: /etc/nginx/sites-available/streaming
    dest: /etc/nginx/sites-enabled/streaming
    state: link
  notify: reload nginx

- name: Ta bort default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Starta nginx
  service:
    name: nginx
    state: started
    enabled: yes