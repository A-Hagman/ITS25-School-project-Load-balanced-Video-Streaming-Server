---
- name: Install Python and dependencies
  apt:
    name: [python3, python3-pip, python3-venv]
    state: present
    update_cache: yes

- name: Create application directory
  file:
    path: /opt/nitflix
    state: directory
    owner: vagrant
    mode: "0755"

- name: Create templates directory
  file:
    path: /opt/nitflix/templates
    state: directory
    owner: vagrant

- name: Create static directory
  file:
    path: /opt/nitflix/static
    state: directory
    owner: vagrant

- name: Copy app.py and requirements.txt
  copy:
    src: "{{ item }}"
    dest: /opt/nitflix/{{ item }}
    owner: vagrant
  loop:
    - app.py
    - requirements.txt
  notify: restart flask

- name: Copy HTML template
  copy:
    src: templates/index.html
    dest: /opt/nitflix/templates/index.html
    owner: vagrant
  notify: restart flask

- name: Copy CSS
  copy:
    src: streming.css
    dest: /opt/nitflix/static/streming.css
    owner: vagrant

- name: Create virtual environment
  command:
    cmd: python3 -m venv /opt/nitflix/venv
    creates: /opt/nitflix/venv

- name: Install Python packages
  pip:
    requirements: /opt/nitflix/requirements.txt
    virtualenv: /opt/nitflix/venv

- name: Install systemd service
  template:
    src: flask.service.j2
    dest: /etc/systemd/system/flask.service
  notify:
    - reload systemd
    - restart flask

- name: Start and activate Flask
  service:
    name: flask
    state: started
    enabled: yes